<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Orgrise</title>

    <link rel="stylesheet" href="../css/default.css" />
    <link rel="stylesheet" href="../css/logout-main.css" />

    <script
      src="https://kit.fontawesome.com/5017fb5146.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <header>
      <div id="header-logo">
        <img id="header-logo__icon" src="../img/logo.png" alt="" />

        <a href="../web/logout-main.html"><h1 id="header-logo__name">rgrise</h1></a>
      </div>
      <nav id="header-buttons">
        <a class="header-buttons" id="header-buttons__support"> Suporte </a>

        <a
          class="header-buttons"
          id="header-buttons__login"
          href="../web/login.html"
        >
          Entrar
        </a>

        <a class="header-buttons" id="header-buttons__create-account" href="../web/create-account.html">
          Criar Conta
        </a>

        <a id="header-buttons__menu">
          <i class="fa-solid fa-bars"></i>
        </a>
      </nav>
    </header>

    <main>
      <section id="main-preview-container">
        <div id="main-preview-container-image-area">
          <button
            class="main-preview-container-image-area__side-buttons"
            id="main-preview-container-image-area__side-buttons__go-back"
          >
            <i class="fa-solid fa-caret-left"></i>
          </button>

          <img
            id="main-preview-container-image-area__image"
            src="../img/banner-multi-plataforma.jpg"
            alt=""
          />

          <button
            class="main-preview-container-image-area__side-buttons"
            id="main-preview-container-image-area__side-buttons__go-forward"
          >
            <i class="fa-solid fa-caret-right"></i>
          </button>
        </div>

        <span id="main-preview-container-rating">
          <i class="fa-regular fa-circle-dot"></i>
          <i class="fa-regular fa-circle-dot"></i>
          <i class="fa-solid fa-circle-dot"></i>
          <i class="fa-regular fa-circle-dot"></i>
          <i class="fa-regular fa-circle-dot"></i>
        </span>

        <h1 id="main-preview-container-title">
          ACESSE EM <br />
          QUALQUER DISPOSITIVO
        </h1>

        <p id="main-preview-container-description">
          Organize, monitore e visualize seu estoque em tempo real de qualquer
          lugar, com acesso rápido e prático no celular, tablet ou computador.
        </p>
      </section>

      <a id="start-button" href="../web/login.html">
        Comece Agora <i class="fa-solid fa-person-running"></i>
      </a>
    </main>

    <footer>
      <section id="footer-social-medias">
        <span id="footer-social-medias-title">Siga Orgrise:</span>

        <nav id="footer-social-medias-buttons">
          <button
            class="footer-social-medias-buttons"
            id="footer-social-medias-buttons__facebook"
          >
            <i class="fa-brands fa-facebook"></i>
          </button>
          <button
            class="footer-social-medias-buttons"
            id="footer-social-medias-buttons__instagram"
          >
            <i class="fa-brands fa-instagram"></i>
          </button>
          <button
            class="footer-social-medias-buttons"
            id="footer-social-medias-buttons__linkedin"
          >
            <i class="fa-brands fa-linkedin"></i>
          </button>
          <button
            class="footer-social-medias-buttons"
            id="footer-social-medias-buttons__xtwitter"
          >
            <i class="fa-brands fa-x-twitter"></i>
          </button>
          <button
            class="footer-social-medias-buttons"
            id="footer-social-medias-buttons__youtube"
          >
            <i class="fa-brands fa-youtube"></i>
          </button>
          <button
            class="footer-social-medias-buttons"
            id="footer-social-medias-buttons__tiktok"
          >
            <i class="fa-brands fa-tiktok"></i>
          </button>
        </nav>
      </section>

      <section id="footer-mark">
        <span id="footer-mark-text"
          >&copy; Orgrise 2026 Todos os direitos reservados</span
        >
      </section>
    </footer>
  </body>
</html>
