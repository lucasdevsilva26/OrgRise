<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Orgrise</title>

    <link rel="stylesheet" href="../css/default.css" />
    <link rel="stylesheet" href="../css/login.css" />

    <script
      src="https://kit.fontawesome.com/5017fb5146.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <header>
      <div id="header-logo">
        <img id="header-logo__icon" src="../img/logo.png" alt="" />

        <a href="../web/logout-main.html"><h1 id="header-logo__name">rgrise</h1></a>
      </div>
      <nav id="header-buttons">
        <a class="header-buttons" id="header-buttons__support"> Suporte </a>

        <a class="header-buttons" id="header-buttons__create-account" href="../web/create-account.html">
          Criar Conta
        </a>

        <a id="header-buttons__menu">
          <i class="fa-solid fa-bars"></i>
        </a>
      </nav>
    </header>

    <main>
      <section id="main-login-container">
        <h1 id="main-login-container-title"><label for="email">Entrar</label></h1>

        <form id="main-login-form" action="">
          <div class="main-login-form__areas" id="main-login-form__email-area">
            <label class="form-input-labels" id="email-label" for="email"
              >Email</label
            >
            <input id="email" name="email" type="email" placeholder="Digite seu email"/>
          </div>
          <div
            class="main-login-form__areas"
            id="main-login-form__password-area"
          >
            <label class="form-input-labels" id="password-label" for="password"
              >Senha</label
            >
            <input id="password" name="password" type="password" placeholder="Digite sua senha"/>

            <a id="forgot-password-link" href="">Esqueceu sua senha?</a>
          </div>

          <button id="main-login-form__access-button" disabled>Entrar</button>

          <p id="unregistered-link">Não possui uma conta?<a href="../web/create-account.html"> Registre-se</a></p>
        </form>
      </section>
    </main>

    <footer>
      <section id="footer-social-medias">
        <span id="footer-social-medias-title">Siga Orgrise:</span>

        <nav id="footer-social-medias-buttons">
          <button
            class="footer-social-medias-buttons"
            id="footer-social-medias-buttons__facebook"
          >
            <i class="fa-brands fa-facebook"></i>
          </button>
          <button
            class="footer-social-medias-buttons"
            id="footer-social-medias-buttons__instagram"
          >
            <i class="fa-brands fa-instagram"></i>
          </button>
          <button
            class="footer-social-medias-buttons"
            id="footer-social-medias-buttons__linkedin"
          >
            <i class="fa-brands fa-linkedin"></i>
          </button>
          <button
            class="footer-social-medias-buttons"
            id="footer-social-medias-buttons__xtwitter"
          >
            <i class="fa-brands fa-x-twitter"></i>
          </button>
          <button
            class="footer-social-medias-buttons"
            id="footer-social-medias-buttons__youtube"
          >
            <i class="fa-brands fa-youtube"></i>
          </button>
          <button
            class="footer-social-medias-buttons"
            id="footer-social-medias-buttons__tiktok"
          >
            <i class="fa-brands fa-tiktok"></i>
          </button>
        </nav>
      </section>

      <section id="footer-mark">
        <span id="footer-mark-text"
          >&copy; Orgrise 2026 Todos os direitos reservados</span
        >
      </section>
    </footer>
  </body>
</html>
